name: CI - teste calculadora Node.js Jest #nome do workflow (pipeline)

on: #eventos de gatilho que disparam o workflow (pipeline)
  push: #evento que push para a branch main
    branches: #especifica as branches que disparam o evento de push
      - main #evento de push para a branch main
  pull_request: #evento de pull request para as branches
    branches:
      - main
      - developer
      - fix
  workflow_dispatch: #permite disparar o workflow manualmente

jobs: #define os trabalhos (jobs) que serão executados no workflow
  build: #nome do trabalho (job)
    runs-on: ubuntu-latest #especifica o ambiente de execução (runner) do trabalho

    strategy: # CORRIGIDO: Indentado para dentro de 'build'
      matrix: 
        node-version: [18.x, 20.x] # Nota: Atualizei as versões pois 14 e 16 já estão descontinuadas

    steps: # CORRIGIDO: Indentado para dentro de 'build'
      - uses: actions/checkout@v4 

      - name: use Node.js 
        uses: actions/setup-node@v4 
        with: 
          node-version: ${{ matrix.node-version }} # CORRIGIDO: Usando a variável da matriz em vez de travar na 20.x

      - name: Install dependencies 
        run: npm ci # CORRIGIDO: 'npm ci' ou 'npm install' para instalar as dependências

      - name: Run tests 
        run: npx jest